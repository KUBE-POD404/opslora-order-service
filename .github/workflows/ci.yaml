name: Order Service CI

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

concurrency:
  group: order-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  get-author:
    name: Get commit author details
    runs-on: ubuntu-latest
    outputs:
      email: ${{ steps.author.outputs.email }}
      name: ${{ steps.author.outputs.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: author
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          EMAIL=$(git show -s --format='%ae' "$SHA")
          NAME=$(git show -s --format='%an' "$SHA")

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

  sonar-scan:
    name: SonarQube Scan
    uses: ./.github/workflows/ci_sonar_scan.yaml
    secrets: inherit

  snyk-scan:
    name: Snyk Scan
    needs: sonar-scan
    if: ${{ needs.sonar-scan.outputs.quality_gate_status == 'PASSED' }}
    uses: ./.github/workflows/ci_snyk_scan.yaml
    secrets: inherit

  notify:
    name: Notify Pipeline Result
    needs:
      - sonar-scan
      - snyk-scan
      - get-author
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug values
        run: |
          echo "Sonar output: ${{ needs.sonar-scan.outputs.quality_gate_status }}"
          echo "Snyk output: ${{ needs.snyk-scan.outputs.snyk_status }}"
          echo "Sonar result: ${{ needs.sonar-scan.result }}"
          echo "Snyk result: ${{ needs.snyk-scan.result }}"

      - name: Determine failure reason
        id: outcome
        run: |
          SONAR_RESULT="${{ needs.sonar-scan.result }}"
          SNYK_RESULT="${{ needs.snyk-scan.result }}"

          echo "Sonar result: $SONAR_RESULT"
          echo "Snyk result: $SNYK_RESULT"

          if [[ "$SONAR_RESULT" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "reason=SonarQube Quality Gate Failed" >> $GITHUB_OUTPUT
            echo "tool=sonar" >> $GITHUB_OUTPUT

          elif [[ "$SNYK_RESULT" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "reason=Snyk Security Scan Failed" >> $GITHUB_OUTPUT
            echo "tool=snyk" >> $GITHUB_OUTPUT

          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Send Notification
        if: ${{ steps.outcome.outputs.status == 'failure' }}
        uses: ./.github/actions/notification-action
        with:
          pipeline_name: ${{ github.workflow }}
          repository_name: ${{ github.repository }}
          failure_reason: ${{ steps.outcome.outputs.reason }}
          status: ${{ steps.outcome.outputs.status }}
          author: ${{ needs.get-author.outputs.name || github.actor }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          mail_from: ${{ secrets.MAIL_FROM }}
          mail_to: ${{ needs.get-author.outputs.email }}
          slack_webhook: ${{ secrets.SLACK_INCOMING_WEBHOOK }}
          tool: ${{ steps.outcome.outputs.tool }}
          workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          sonar_host_url: ${{ secrets.SONAR_HOST_URL }}
          sonar_project_key: ${{ secrets.SONAR_PROJECT_KEY }}
          snyk_org: ${{ secrets.SNYK_ORG }}
          snyk_project_name: ${{ github.event.repository.name }}
          snyk_project_id: ${{ secrets.SNYK_PROJECT_ID }}

      - name: Fail pipeline if needed
        if: ${{ steps.outcome.outputs.status == 'failure' }}
        run: |
          echo "Failing pipeline after notification"
          exit 1