name: CI Notification Action
description: Send email and Slack notifications for CI status

inputs:
  pipeline_name:
    required: true
  repository_name:
    required: true
  failure_reason:
    required: true
  author:
    required: true
  smtp_username:
    required: true
  smtp_password:
    required: true
  mail_from:
    required: true
  mail_to:
    required: true
  slack_webhook:
    required: true
  tool:
    required: true
  workflow_url:
    required: true
  status:
    description: success or failure
    required: true
  sonar_host_url:
    required: false
  sonar_project_key:
    required: false
  snyk_org:
    required: false
  snyk_project_id:
    required: false

runs:
  using: composite

  steps:
    - name: Build Report URL
      id: build_url
      shell: bash
      run: |
        if [ "${{ inputs.tool }}" = "sonar" ]; then
          echo "url=${{ inputs.sonar_host_url }}/dashboard?id=${{ inputs.sonar_project_key }}" >> $GITHUB_OUTPUT
        elif [ "${{ inputs.tool }}" = "snyk" ]; then
          echo "url=https://app.snyk.io/org/${{ inputs.snyk_org }}/project/${{ inputs.snyk_project_id }}" >> $GITHUB_OUTPUT
        else
          echo "url=${{ inputs.workflow_url }}" >> $GITHUB_OUTPUT
        fi

    - name: Send email
      uses: hilarion5/send-mail@v1
      with:
        smtp-server: smtp.hostinger.com
        smtp-port: 587
        smtp-secure: false
        username: ${{ inputs.smtp_username }}
        password: ${{ inputs.smtp_password }}
        from-email: "Opslora CI Alerts <${{ inputs.mail_from }}>"
        to-email: ${{ inputs.mail_to }}

        subject: "[CI] ${{ inputs.pipeline_name }} - ${{ inputs.failure_reason }}"

        html: |
          <div style="margin:0;padding:24px;background:#f4f7fb;font-family:Arial;">
            <table style="max-width:700px;margin:auto;background:#fff;border-radius:12px;border:1px solid #e5e7eb;">
              
              <tr>
                <td style="background:${{ inputs.status == 'success' && '#16a34a' || '#b91c1c' }};color:#fff;padding:18px;font-size:20px;">
                  ${{ inputs.status == 'success' && 'Pipeline Success' || 'Pipeline Failure' }}
                </td>
              </tr>

              <tr>
                <td style="padding:20px;">
                  <p><b>Pipeline:</b> ${{ inputs.pipeline_name }}</p>
                  <p><b>Repository:</b> ${{ inputs.repository_name }}</p>
                  <p><b>Author:</b> ${{ inputs.author }}</p>
                  <p><b>Tool:</b> ${{ inputs.tool }}</p>
                  <p><b>Message:</b> ${{ inputs.failure_reason }}</p>

                  <br/>

                  <a href="${{ steps.build_url.outputs.url }}"
                     style="padding:10px 14px;background:#2563eb;color:#fff;border-radius:6px;text-decoration:none;">
                     View Report
                  </a>

                  <a href="${{ inputs.workflow_url }}"
                     style="margin-left:10px;padding:10px 14px;background:#111;color:#fff;border-radius:6px;text-decoration:none;">
                     View Workflow
                  </a>
                </td>
              </tr>
            </table>
          </div>

    - name: Prepare Slack values
      id: slack_vars
      shell: bash
      run: |
        if [ "${{ inputs.status }}" = "success" ]; then
          echo "color=#16a34a" >> $GITHUB_OUTPUT
          echo "status_text=PASSED" >> $GITHUB_OUTPUT
          echo "header=Pipeline Success" >> $GITHUB_OUTPUT
          echo "button_style=primary" >> $GITHUB_OUTPUT
          echo "summary=passed" >> $GITHUB_OUTPUT
        else
          echo "color=#dc2626" >> $GITHUB_OUTPUT
          echo "status_text=FAILED" >> $GITHUB_OUTPUT
          echo "header=Pipeline Failure Alert" >> $GITHUB_OUTPUT
          echo "button_style=danger" >> $GITHUB_OUTPUT
          echo "summary=failed" >> $GITHUB_OUTPUT
        fi


    - name: Post to Slack
      uses: slackapi/slack-github-action@v3.0.1
      with:
        webhook: ${{ inputs.slack_webhook }}
        webhook-type: incoming-webhook
        payload: |
          text: "${{ inputs.pipeline_name }} ${{ steps.slack_vars.outputs.summary }}"
          attachments:
            - color: "${{ steps.slack_vars.outputs.color }}"
              blocks:

                - type: header
                  text:
                    type: plain_text
                    text: "${{ steps.slack_vars.outputs.header }}"

                - type: section
                  fields:
                    - type: mrkdwn
                      text: "*Pipeline:*\n${{ inputs.pipeline_name }}"
                    - type: mrkdwn
                      text: "*Repository:*\n${{ inputs.repository_name }}"
                    - type: mrkdwn
                      text: "*Status:*\n${{ steps.slack_vars.outputs.status_text }}"
                    - type: mrkdwn
                      text: "*Author:*\n${{ inputs.author }}"

                - type: section
                  text:
                    type: mrkdwn
                    text: "*Reason:*\n${{ inputs.failure_reason }}"

                - type: actions
                  elements:
                    - type: button
                      text:
                        type: plain_text
                        text: "View Report"
                      url: "${{ steps.build_url.outputs.url }}"
                      style: "${{ steps.slack_vars.outputs.button_style }}"

                    - type: button
                      text:
                        type: plain_text
                        text: "View Workflow Run"
                      url: "${{ inputs.workflow_url }}"
                      style: "${{ steps.slack_vars.outputs.button_style }}"